[workspace]
channels = ["https://prefix.dev/conda-forge"]
platforms = ["linux-64", "osx-arm64", "win-64"]
requires-pixi = ">=0.65.0"

[environments]
docs = ["docs"]
tests = ["tests"]

[dependencies]
python = "3.12.*"

[feature.tests.dependencies]
pytest = "*"
ruff = "*"

[feature.tests.pypi-dependencies]
array-api-compat-tf = { path = ".", editable = true }
tensorflow = ">=2.21.0,<3"
torch = "*"
jax = { version = "*", extras = ["cpu"] }
numpy = ">=1.22"

[feature.tests.tasks]
tests = { cmd = "pytest -v tests/", description = "Run tests", env = { TF_CPP_MIN_LOG_LEVEL = "2", TF_ENABLE_ONEDNN_OPTS = "0" } }
lint = { cmd = "ruff check src tests", description = "Run ruff" }

[feature.docs.dependencies]
furo = "*"
linkify-it-py = "*"
myst-parser = "*"
sphinx = "*"
sphinx-copybutton = "*"
sphinx-autobuild = "*"

[feature.docs.pypi-dependencies]
array-api-compat = "*"

[feature.docs.tasks]
docs = { cmd = "make html", cwd = "docs", description = "Build docs" }
